<!DOCTYPE html>
    <head>
        <link rel='stylesheet' href='../styles/myStyle.css' />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>ThymeMachine/Sign Up</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>

    <body>

        <header class="text-center custom-header text-white p-3 fw-bold">ThymeMachine</header>


        <div class="logo-bar d-flex justify-content-center align-items-center">
            <img src="../images/ThymeMachine.png" alt="ThymeMachine Logo" class="img-fluid" style="height: 80px;">
        </div>


        <div class="login-container container d-flex flex-column mt-3">
            <div class="login-card card p-4">
    
                <h2>Welcome to ThymeMachine!</h2><br>

                <h3>Create an Account:</h3>

   
                <form id="signupForm">

                    <label class="form-label">Username:</label>
                    <input type="text" id="username" name="username" class="form-control" required><br>

                    <label class="form-label">Email Address:</label>
                    <input type="email" id="emailAddress" name="emailAddress" class="form-control" required><br>

                    <label class="form-label">Password:</label>
                    <input type="password" id="password" name="password" class="form-control" required><br>

                    <button type="submit" class="btn btn-secondary">Sign Up</button>

                    <p id="signupResult" class="mt-2 text-danger"></p>
    
                </form>

                <br><h2>Returning to ThymeMachine?</h2>
                <h3>Log in Here:</h3>
                <p><a href="login.html">Login</a></p>

            </div>
        </div>

        <script src='../scripts/myScripts.js'></script>

    </body>

</html>
