<!DOCTYPE html>
<html lang="en">
    <head>  
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel='stylesheet' href='../static/styles/myStyle.css'>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>Secure PWA | Login</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    </head>
    
    <body>

        <main>

            <header class="text-center custom-header position-relative text-black p-3 fw-bold">🔒 Secure PWA 🔒</header>

            <div class="login-container container d-flex flex-column mt-3">
                <div class="login-card card p-4">
        
                    <h2>Welcome to the Secure PWA, Already a User?</h2><br>
    
                    <h3>Sign In:</h3>
    
       
                    <form id="loginForm">
    
                        <label class="form-label">Username:</label>
                        <input type="text" id="loginUsername" name="loginUsername" class="form-control" required><br>
            
                        <label class="form-label">Password:</label>
                        <input type="password" id="loginPassword" name="loginPassword" class="form-control" required><br>
    
                        <button type="submit" class="btn btn-secondary">Log In</button><br>
    
                        <p id="loginResult" class="mt-2 mb-2"></p>
        
                    </form>
    
                    <br><h2>New User? Sign Up Today:</h2>
                    <p><a href="register.html">Sign Up</a></p>
    
                </div>
            </div>

        </main>

    </body>

</html>
