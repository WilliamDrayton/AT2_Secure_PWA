    <!DOCTYPE html>
    <html lang="en">
        <head>  
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
            <link rel='stylesheet' href='../static/styles/myStyle.css'>
            <title>Secure PWA | myProfile</title>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
        </head>
        
        <body>
    
            <main>

                <div id="my-profile-content" class="my-profile-content mb-2">
                    <div class="container p-4 justify-content-center card p-4 shadow">
                
    
                        <h2 class="text-center mb-4">My Profile</h2>
    
                        <form id="profileForm">
    
                            <div class="mb-3">
                                <label class="form-label">Username:</label>
                                <input type="text" id="profileUsername" class="form-control" readonly>
                            </div>
    
                            <div class="mb-3">
                                <label class="form-label">Email Address:</label>
                                <input type="email" id="profileEmail" class="form-control" readonly>
                            </div>
    
                            <div class="mb-3">
                                <label class="form-label">New Password:</label>
                                <input type="password" id="newPassword" class="form-control" placeholder="Enter new password">
                            </div>
    
                                <div class="form-check p-2 mt-1">
                                    <input class="form-check-input" type="checkbox" id="showPassword">
                                    <label class="form-check-label" for="showPassword">Show Password</label>
                                </div>
                            </div>
    
                            <button type="button" name="editAccount" id="editAccount" class="btn btn-secondary">Edit</button><br><br>
    
                            <button type="button" name="logoutAccount" id="logoutAccount" class="btn btn-danger">Log Out</button><br><br>
    
                            <button type="button" name="deleteAccount" id="deleteAccount" class="btn btn-danger">Delete Account</button><br><br>
    
    
                        </form>
    
                    </div>
                </div>
    
            </main>

            <script src='../static/scripts/myScript.js'></script>
    
        </body>
    
    </html>
