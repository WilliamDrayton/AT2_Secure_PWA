<!DOCTYPE html>
<html>
    <head>
		<link rel='stylesheet' href='styles/myStyle.css' />
		<script src='scripts\myScripts.js'></script>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
		<title>Thyme Machine/Add New</title>
	</head>

    <body>
		<header class="text-center bg-primary text-white p-3">
			ThymeMachine
		</header>

		<main class="container p-4">

			<h2>Add a New Recipe:</h2>
			<form id="addRecipe">
				<div class="mb-3">
					<label>Recipe Name:</label>
					<input type="text" id="recipeName" name="recipeName" required>
				</div>

				<div class="mb-3">
					<label>Ingredients:</label>
					<input type="text" placeholder="Ingredient Name" name="ingredientName" required>
					<input type="number" placeholder="amount" name="ingredientAmount" required>
					<select name="ingredientUnit">
						<option value="mg">mg</option>
						<option value="mg">g</option>
						<option value="kg">kg</option>
						<option value="mL">mL</option>
						<option value="L">L</option>
						<option value="lb">lb</option>
						<option value="oz">oz</option>
						<option value="gal">gal</option>
					</select>
				    <button type="button" id="addanotherIngredietn" class="btn btn-secondary btn-sm mt-2">Add Another Ingredient</button>
				</div>
			</form>






			<nav class="navbar fixed-bottom bg-light border-top">
				<a class="nav link mx-3" href='index.html'><img src="images/ThymeMachine.png" alt="Home" width="200" height="200"></img></a>
				<a class="nav link mx-3" href='pages/addNew.html'>Add Recipe</a>
				<a class="nav link mx-3" href='pages/myRecipes.html'>My Recipes</a>
				<a class="nav link mx-3" href='pages/myProfile.html'>My Profile</a>
			</nav>
			



		</main>

    </body>
    
</html>
