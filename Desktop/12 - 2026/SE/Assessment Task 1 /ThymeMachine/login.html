<!DOCTYPE html>
<head>
    <link rel='stylesheet' href='styles/myStyle.css' />
    <script src='scripts/myScripts.js'></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>ThymeMachine/Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>

    <header class="text-center custom-header text-white p-3 fw-bold">ThymeMachine</header>


    <div class="logo-bar d-flex justify-content-center align-items-center">
        <img src="images/ThymeMachine.png" alt="ThymeMachine Logo" class="img-fluid" style="height: 80px;">
    </div>


    <div class="login-container container d-flex flex-column mt-3">
        <div class="login-card card p-4">
    
            <h2>Existing User? Welcome Back!</h2><br>

            <h3>Sign In:</h3>

   
            <form id="loginForm">

                <label class="form-label">Username:</label>
                <input type="text" id="username" name="username" class="form-control" required><br>
        
                <label class="form-label">Password:</label>
                <input type="password" id="password" name="password" class="form-control" required><br>

                <button type="submit" class="btn btn-secondary">Log In</button>
    
            </form>

            <br><h2>New User? Sign Up Today:</h2>
            <p><a href="signUp.html">Sign Up</a></p>

        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            window.location.href = 'index.html'; 
        });
    </script>


</body>
</html>
